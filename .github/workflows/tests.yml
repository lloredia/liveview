# GitHub Actions CI configuration for LiveView tests
# Runs: unit tests, integration tests, E2E tests, security tests, and load tests

name: Tests

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  backend-tests:
    name: Backend Tests
    runs-on: ubuntu-latest
    
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: liveview
          POSTGRES_PASSWORD: liveview
          POSTGRES_DB: liveview_test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

      redis:
        image: redis:7
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 6379:6379

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: |
          cd backend
          pip install -r requirements.txt
          pip install pytest-asyncio pytest-cov

      - name: Run unit tests
        run: |
          cd backend
          pytest tests/ -v --cov=. --cov-report=xml --cov-fail-under=70
        env:
          LV_DATABASE_URL: postgresql+asyncpg://liveview:liveview@localhost:5432/liveview_test
          LV_REDIS_URL: redis://localhost:6379/0

      - name: Run integration tests
        run: |
          cd backend
          pytest tests/test_integration_api.py -v
        env:
          LV_DATABASE_URL: postgresql+asyncpg://liveview:liveview@localhost:5432/liveview_test
          LV_REDIS_URL: redis://localhost:6379/1

      - name: Run migration tests
        run: |
          cd backend
          pytest tests/test_migrations.py -v
        env:
          LV_DATABASE_URL: postgresql+asyncpg://liveview:liveview@localhost:5432/liveview_migrations_test
          LV_REDIS_URL: redis://localhost:6379/2

      - name: Run security tests
        run: |
          cd backend
          pytest tests/test_security.py -v
        env:
          LV_DATABASE_URL: postgresql+asyncpg://liveview:liveview@localhost:5432/liveview_security_test
          LV_REDIS_URL: redis://localhost:6379/3

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v3
        with:
          files: ./backend/coverage.xml
          flags: backend
          fail_ci_if_error: false

  mobile-tests:
    name: Mobile Tests (Expo)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: mobile/package-lock.json

      - name: Install dependencies
        run: |
          cd mobile
          npm ci

      - name: Type check
        run: |
          cd mobile
          npx tsc --noEmit

  load-tests:
    name: Load Tests
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: liveview
          POSTGRES_PASSWORD: liveview
          POSTGRES_DB: liveview_test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

      redis:
        image: redis:7
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 6379:6379

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: |
          cd backend
          pip install -r requirements.txt
          pip install locust

      - name: Start backend server
        run: |
          cd backend
          python -m api.service &
          sleep 5
        env:
          LV_DATABASE_URL: postgresql+asyncpg://liveview:liveview@localhost:5432/liveview_test
          LV_REDIS_URL: redis://localhost:6379/0

      - name: Run load tests (Locust)
        run: |
          cd backend
          locust -f scripts/load_test_locust.py \
            --host=http://localhost:8000 \
            --users=10 \
            --spawn-rate=2 \
            --run-time=1m \
            --headless
        timeout-minutes: 5

      - name: Run load tests (k6)
        if: success() || failure()
        run: |
          cd backend
          # Install k6
          sudo apt-key adv --keyserver hkp://keyserver.ubuntu.com:80 --recv-keys C5AD17C747E3415A3642D57D77C6C491D6AC1D69
          echo "deb https://dl.k6.io/deb stable main" | sudo tee /etc/apt/sources.list.d/k6-stable.list
          sudo apt-get update
          sudo apt-get install k6
          
          # Run tests
          k6 run scripts/load_test_k6.js --vus 10 --duration 1m
        timeout-minutes: 5

  lint-and-format:
    name: Lint & Format
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.11"
          cache: pip

      - name: Install linters
        run: |
          pip install ruff mypy

      - name: Lint Python code
        run: |
          cd backend
          ruff check . --fix

      - name: Type check Python code
        run: |
          cd backend
          mypy . --ignore-missing-imports
        continue-on-error: true

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: mobile/package-lock.json

      - name: Install mobile deps
        run: |
          cd mobile
          npm ci

      - name: Lint TypeScript (mobile)
        run: |
          cd mobile
          npx tsc --noEmit
        continue-on-error: true

  build:
    name: Build Backend Image
    runs-on: ubuntu-latest
    if: success()

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      - name: Build backend image
        uses: docker/build-push-action@v4
        with:
          context: backend
          target: api
          push: false
          cache-from: type=gha
          cache-to: type=gha,mode=max
